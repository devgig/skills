apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: {{WORKLOAD_NAME}}

resources:
  - deployment.yaml
  - service.yaml
  - acr-external-secret.yaml

patches:
  - target:
      kind: Deployment
      name: {{WORKLOAD_NAME}}
    path: image-patch.yaml

labels:
- includeSelectors: true
  pairs:
    app: {{APP_LABEL}}
    component: backend
